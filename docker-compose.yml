name: banking-mockup

services:
  mock-redis:
    image: redis:7.2
    container_name: mock-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  mock-banking-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-banking-api
    depends_on:
      - mock-redis
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      REDIS_HOST: mock-redis
      REDIS_PORT: 6379
      MOAJE_BANKING_SECRET: Moaje-banking-secret
    restart: unless-stopped
